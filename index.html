<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jason Jilong Wu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3f0;
    --bg-card: #ffffff;
    --border: #ddd8d0;
    --border-light: #c8c2b8;
    --text: #1a1816;
    --text-dim: #6b6560;
    --text-muted: #9b9590;
    --accent: #d42a54;
    --font-display: 'Fraunces', Georgia, serif;
    --font-mono: 'DM Mono', 'SF Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 480px;
    width: 100%;
    padding: 24px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8833ff);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 900;
    color: #fff;
  }

  h1 {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .bio {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .link:hover {
    border-color: var(--border-light);
    background: #edeae6;
    transform: translateY(-1px);
  }

  .link svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeIn 0.5s ease; }
  .links .link:nth-child(1) { animation: fadeIn 0.4s ease 0.1s backwards; }
  .links .link:nth-child(2) { animation: fadeIn 0.4s ease 0.2s backwards; }
  .links .link:nth-child(3) { animation: fadeIn 0.4s ease 0.3s backwards; }
  .links .link:nth-child(4) { animation: fadeIn 0.4s ease 0.4s backwards; }
</style>
</head>
